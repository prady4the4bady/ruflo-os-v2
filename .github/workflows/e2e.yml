name: E2E

# End-to-end smoke test. Two jobs:
#
# `e2e-contract` (always): builds the minimum orchestration slice
#   (redis → model-gateway → playwright-runner → workflow-engine),
#   waits for /healthz, then runs the e2e suite. The HN-top-story
#   scenario skips itself when no LLM backend is reachable (model-
#   gateway returns 5xx), which is the expected state on a runner
#   without GPU/Ollama. The test still passes for the contract:
#   task creation, subtask decomposition, activity logging.
#
# `e2e-live` (workflow_dispatch only): same but the caller can point
#   MODEL_GATEWAY_URL at a real backend and expect the full scenario
#   to complete.
on:
  workflow_dispatch:
    inputs:
      model_gateway_url:
        description: External model-gateway URL (leave blank to use the in-stack one)
        required: false
        default: ''
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  ESSENTIAL_SERVICES: "redis model-gateway playwright-runner workflow-engine"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  e2e-contract:
    name: E2E contract (LLM-less)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/e2e/requirements.txt

      - name: Install E2E test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tests/e2e/requirements.txt

      - name: Ensure desktop directory
        run: mkdir -p "$HOME/Desktop"

      - name: Start essential services
        run: |
          docker compose -f docker-compose.dev.yml up -d --build --wait \
            --wait-timeout 600 \
            $ESSENTIAL_SERVICES

      - name: Wait for orchestration service /healthz
        run: |
          echo "Waiting for workflow-engine to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:11431/healthz > /dev/null 2>&1; then
              echo "Orchestration service is up after ${i}x5s"
              exit 0
            fi
            echo "  attempt $i/30 - sleeping 5s"
            sleep 5
          done
          echo "Service never became healthy"
          docker compose -f docker-compose.dev.yml logs workflow-engine --no-color | tail -200
          exit 1

      - name: Run E2E test
        env:
          MODEL_GATEWAY_URL: http://127.0.0.1:11430
        run: python -m pytest tests/e2e/test_hn_task.py -s -v

      - name: Dump service logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --no-color $ESSENTIAL_SERVICES | tail -500

      - name: Teardown stack
        if: always()
        run: docker compose -f docker-compose.dev.yml down --remove-orphans

  e2e-live:
    name: E2E live (requires real LLM)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.model_gateway_url != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/e2e/requirements.txt

      - name: Install E2E test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tests/e2e/requirements.txt

      - name: Ensure desktop directory
        run: mkdir -p "$HOME/Desktop"

      - name: Start essential services
        run: |
          docker compose -f docker-compose.dev.yml up -d --build --wait \
            --wait-timeout 600 \
            $ESSENTIAL_SERVICES

      - name: Wait for orchestration service /healthz
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:11431/healthz > /dev/null 2>&1; then
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Run E2E test (live)
        env:
          MODEL_GATEWAY_URL: ${{ github.event.inputs.model_gateway_url }}
        run: python -m pytest tests/e2e/test_hn_task.py -s -v

      - name: Dump service logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --no-color $ESSENTIAL_SERVICES | tail -500

      - name: Teardown stack
        if: always()
        run: docker compose -f docker-compose.dev.yml down --remove-orphans
