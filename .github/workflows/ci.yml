name: Monorepo CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# actions/checkout@v5 runs on Node.js 24 — no deprecation warnings.
# submodules: false prevents fetching the phantom gitlinks listed in
# .gitmodules (compositor/ags-base, etc.) that are heavy and not needed
# to run unit tests.
env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  test-model-gateway:
    name: Phase 1 - model-gateway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-core/model-gateway/requirements-dev.txt

      - name: Install dependencies
        working-directory: ai-core/model-gateway
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: ai-core/model-gateway
        env:
          OPENAI_API_KEY: test-key
        run: pytest tests -v

  test-workflow-engine:
    name: Phase 2 - workflow-engine
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: orchestration/workflow-engine/requirements-dev.txt

      - name: Install dependencies
        working-directory: orchestration/workflow-engine
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: orchestration/workflow-engine
        run: pytest tests -v

  test-screen-agent:
    name: Phase 3 - screen-agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: automation/screen-agent/requirements-dev.txt

      - name: Install dependencies
        working-directory: automation/screen-agent
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: automation/screen-agent
        run: pytest tests -v

  test-aqua-shell:
    name: Phase 4 - aqua-shell
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/aqua-shell/package-lock.json

      - name: Install dependencies
        working-directory: desktop/aqua-shell
        run: npm ci

      - name: Run tests
        working-directory: desktop/aqua-shell
        run: npm test

  test-lumyn-agent:
    name: Phase 5 - lumyn-agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agents/lumyn/requirements-dev.txt

      - name: Install dependencies
        working-directory: agents/lumyn
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: agents/lumyn
        run: pytest tests -v

  validate-compose:
    name: Validate docker-compose configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Validate docker-compose.dev.yml
        run: docker compose -f docker-compose.dev.yml config --quiet

      - name: Validate build/iso/docker-compose.prod.yml
        run: docker compose -f build/iso/docker-compose.prod.yml config --quiet

  audit-python-deps:
    name: Audit Python dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install --upgrade pip pip-audit

      - name: Audit ai-core/model-gateway
        working-directory: ai-core/model-gateway
        run: |
          pip-audit --requirement requirements.txt --no-deps || \
            echo "::notice title=pip-audit::ai-core/model-gateway has advisories (see log)"

      - name: Audit orchestration/workflow-engine
        working-directory: orchestration/workflow-engine
        run: |
          pip-audit --requirement requirements.txt --no-deps || \
            echo "::notice title=pip-audit::orchestration/workflow-engine has advisories (see log)"

      - name: Audit automation/screen-agent
        working-directory: automation/screen-agent
        run: |
          pip-audit --requirement requirements.txt --no-deps || \
            echo "::notice title=pip-audit::automation/screen-agent has advisories (see log)"

      - name: Audit agents/lumyn
        working-directory: agents/lumyn
        run: |
          pip-audit --requirement requirements.txt --no-deps || \
            echo "::notice title=pip-audit::agents/lumyn has advisories (see log)"

  audit-node-deps:
    name: Audit Node.js dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Audit desktop/aqua-shell
        working-directory: desktop/aqua-shell
        run: |
          npm audit --audit-level=moderate || \
            echo "::notice title=npm-audit::desktop/aqua-shell has advisories (see log)"

  trigger-build-iso:
    name: Trigger ISO build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - test-model-gateway
      - test-workflow-engine
      - test-screen-agent
      - test-aqua-shell
      - test-lumyn-agent
      - validate-compose
      - audit-python-deps
      - audit-node-deps
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch build-iso workflow
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-iso.yml',
              ref: 'main'
            });
