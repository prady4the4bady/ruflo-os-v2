name: Monorepo CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# actions/checkout@v5 runs on Node.js 24 — no deprecation warnings.
# submodules: false prevents fetching the phantom gitlinks listed in
# .gitmodules (compositor/ags-base, etc.) that are heavy and not needed
# to run unit tests.
env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  test-model-gateway:
    name: Phase 1 - model-gateway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-core/model-gateway/requirements-dev.txt
      - name: Install dependencies
        working-directory: ai-core/model-gateway
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        working-directory: ai-core/model-gateway
        env:
          OPENAI_API_KEY: test-key
        run: pytest tests -v

  test-workflow-engine:
    name: Phase 2 - workflow-engine
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: orchestration/workflow-engine/requirements-dev.txt
      - name: Install dependencies
        working-directory: orchestration/workflow-engine
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        working-directory: orchestration/workflow-engine
        run: pytest tests -v

  test-screen-agent:
    name: Phase 3 - screen-agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: automation/screen-agent/requirements-dev.txt
      - name: Install dependencies
        working-directory: automation/screen-agent
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        working-directory: automation/screen-agent
        run: pytest tests -v

  test-aqua-shell:
    name: Phase 4 - aqua-shell
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/aqua-shell/package-lock.json
      - name: Install dependencies
        working-directory: desktop/aqua-shell
        run: npm ci
      - name: Run tests
        working-directory: desktop/aqua-shell
        run: npm test

  test-lumyn-agent:
    name: Phase 5 - lumyn-agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agents/lumyn/requirements-dev.txt
      - name: Install dependencies
        working-directory: agents/lumyn
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        working-directory: agents/lumyn
        run: pytest tests -v

  test-kryos-researcher:
    name: Phase 6 - kryos-researcher
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: platform/kryos-researcher/requirements-dev.txt
      - name: Install dependencies
        working-directory: platform/kryos-researcher
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        working-directory: platform/kryos-researcher
        run: pytest tests -v

  test-proposal-gate:
    name: Phase 7 - proposal-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: platform/proposal-gate/requirements-dev.txt
      - name: Install dependencies
        working-directory: platform/proposal-gate
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        working-directory: platform/proposal-gate
        run: pytest tests -v

  validate-compose:
    name: Validate docker-compose configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false
      - name: Validate docker-compose.yml
        run: docker compose config --quiet
      - name: Validate docker-compose.dev.yml
        run: docker compose -f docker-compose.dev.yml config --quiet
      - name: Validate build/iso/docker-compose.prod.yml
        run: docker compose -f build/iso/docker-compose.prod.yml config --quiet

  audit-python-deps:
    name: Audit Python dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install --upgrade pip pip-audit
      - name: Audit ai-core/model-gateway
        working-directory: ai-core/model-gateway
        run: |
          pip-audit --requirement requirements.txt --no-deps || \
          echo "::notice title=pip-audit::ai-core/model-gateway has advisories (see log)"
      - name: Audit orchestration/workflow-engine
        working-directory: orchestration/workflow-engine
        run: |
          pip-audit --requirement requirements.txt --no-deps || \
          echo "::notice title=pip-audit::orchestration/workflow-engine has advisories (see log)"
      - name: Audit automation/screen-agent
        working-directory: automation/screen-agent
        run: |
          pip-audit --requirement requirements.txt --no-deps || \
          echo "::notice title=pip-audit::automation/screen-agent has advisories (see log)"
      - name: Audit agents/lumyn
        working-directory: agents/lumyn
        run: |
          pip-audit --requirement requirements.txt --no-deps || \
          echo "::notice title=pip-audit::agents/lumyn has advisories (see log)"
      - name: Audit platform/kryos-researcher
        working-directory: platform/kryos-researcher
        run: |
          pip-audit --requirement requirements.txt --no-deps || \
          echo "::notice title=pip-audit::platform/kryos-researcher has advisories (see log)"
      - name: Audit platform/proposal-gate
        working-directory: platform/proposal-gate
        run: |
          pip-audit --requirement requirements.txt --no-deps || \
          echo "::notice title=pip-audit::platform/proposal-gate has advisories (see log)"

  audit-node-deps:
    name: Audit Node.js dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Audit desktop/aqua-shell
        working-directory: desktop/aqua-shell
        run: |
          npm audit --audit-level=moderate || \
          echo "::notice title=npm-audit::desktop/aqua-shell has advisories (see log)"

  test-neila:
    name: Phase N - neila
    runs-on: ubuntu-latest
    env:
      NEILA_DB_PATH: /tmp/neila_test.db
      OPENAI_API_KEY: test-key
      ANTHROPIC_API_KEY: test-key
      OPENROUTER_API_KEY: test-key
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: ai-core/neila
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Create NEILA uppercase symlink and activate conftest
        working-directory: ai-core/neila
        run: |
          ln -sf neila NEILA
          cd tests && ln -sf conftest_ouroboros_disabled.py conftest.py
      - name: Run Neila tests
        working-directory: ai-core/neila
        run: python -m pytest tests/ -v --tb=short --ignore=tests/test_release_workflow.py --ignore=tests/test_runtime_mode_elevation.py --ignore=tests/test_server_auth.py --ignore=tests/test_settings_updates_ui.py --ignore=tests/test_skill_exec.py --ignore=tests/test_packaging_sync.py

  test-ahnis:
    name: Phase N - ahnis
    runs-on: ubuntu-latest
    env:
      AHNIS_DB_PATH: /tmp/ahnis_test.db
      OPENAI_API_KEY: test-key
      ANTHROPIC_API_KEY: test-key
      OPENROUTER_API_KEY: test-key
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: ai-core/ahnis
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Create AHNIS uppercase symlink
        working-directory: ai-core/ahnis
        run: ln -sf ahnis AHNIS
      - name: Run Ahnis tests
        working-directory: ai-core/ahnis
        run: python -m pytest tests/ -v --tb=short --ignore=tests/test_mcp_server.py --ignore=tests/test_searcher.py

  trigger-build-iso:
    name: Trigger ISO build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - test-model-gateway
      - test-workflow-engine
      - test-screen-agent
      - test-aqua-shell
      - test-lumyn-agent
      - test-kryos-researcher
      - test-proposal-gate
      - validate-compose
      - audit-python-deps
      - audit-node-deps
      - test-neila
      - test-ahnis
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch build-iso workflow
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-iso.yml',
              ref: 'main'
            });
