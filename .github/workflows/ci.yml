name: Monorepo CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-model-gateway:
    name: Phase 1 - model-gateway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ai-core/model-gateway
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: ai-core/model-gateway
        env:
          OPENAI_API_KEY: "test-key"
        run: pytest tests -v

  test-workflow-engine:
    name: Phase 2 - workflow-engine
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: orchestration/workflow-engine
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: orchestration/workflow-engine
        run: pytest tests -v

  test-screen-agent:
    name: Phase 3 - screen-agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: automation/screen-agent
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: automation/screen-agent
        run: pytest tests -v

  test-aqua-shell:
    name: Phase 4 - aqua-shell
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: desktop/aqua-shell
        run: npm install

      - name: Run tests
        working-directory: desktop/aqua-shell
        run: npm test

  test-lumyn:
    name: Phase 5 - lumyn
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: agents/lumyn
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: agents/lumyn
        run: pytest tests -v

  trigger-build-iso:
    name: Trigger ISO build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - test-model-gateway
      - test-workflow-engine
      - test-screen-agent
      - test-aqua-shell
      - test-lumyn
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch build-iso workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-iso.yml',
              ref: 'main'
            });
