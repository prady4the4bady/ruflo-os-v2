name: Monorepo CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-model-gateway:
    name: Phase 1 - model-gateway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: 'ai-core/model-gateway/requirements-dev.txt'

      - name: Install dependencies
        working-directory: ai-core/model-gateway
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: ai-core/model-gateway
        env:
          OPENAI_API_KEY: "test-key"
        run: pytest tests -v

  test-workflow-engine:
    name: Phase 2 - workflow-engine
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: 'orchestration/workflow-engine/requirements-dev.txt'

      - name: Install dependencies
        working-directory: orchestration/workflow-engine
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: orchestration/workflow-engine
        run: pytest tests -v

  test-screen-agent:
    name: Phase 3 - screen-agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: 'automation/screen-agent/requirements-dev.txt'

      - name: Install dependencies
        working-directory: automation/screen-agent
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: automation/screen-agent
        run: pytest tests -v

  test-aqua-shell:
    name: Phase 4 - aqua-shell
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: 'desktop/aqua-shell/package-lock.json'

      - name: Install dependencies
        working-directory: desktop/aqua-shell
        run: npm ci

      - name: Run tests
        working-directory: desktop/aqua-shell
        run: npm test

  test-lumyn:
    name: Phase 5 - lumyn
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: 'agents/lumyn/requirements-dev.txt'

      - name: Install dependencies
        working-directory: agents/lumyn
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: agents/lumyn
        run: pytest tests -v

  validate-compose:
    name: Validate docker-compose configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker-compose config > /dev/null

      - name: Validate docker-compose.dev.yml
        run: docker-compose -f docker-compose.dev.yml config > /dev/null

  audit-python-deps:
    name: Audit Python dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Safety
        run: pip install safety

      - name: Audit ai-core/model-gateway
        run: safety check --file ai-core/model-gateway/requirements.txt
        continue-on-error: true

      - name: Audit orchestration/workflow-engine
        run: safety check --file orchestration/workflow-engine/requirements.txt
        continue-on-error: true

      - name: Audit automation/screen-agent
        run: safety check --file automation/screen-agent/requirements.txt
        continue-on-error: true

      - name: Audit agents/lumyn
        run: safety check --file agents/lumyn/requirements.txt
        continue-on-error: true

  audit-node-deps:
    name: Audit Node.js dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit desktop/aqua-shell
        working-directory: desktop/aqua-shell
        run: npm audit --audit-level=moderate
        continue-on-error: true

  trigger-build-iso:
    name: Trigger ISO build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - test-model-gateway
      - test-workflow-engine
      - test-screen-agent
      - test-aqua-shell
      - test-lumyn
      - validate-compose
      - audit-python-deps
      - audit-node-deps
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch build-iso workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-iso.yml',
              ref: 'main'
            });
