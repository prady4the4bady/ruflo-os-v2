name: Build PradyOS ISO

on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install live-build
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap rsync xorriso grub-pc-bin grub-efi-amd64-bin

      - name: Build ISO
        working-directory: iso-build
        run: sudo make build

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v7
        with:
          name: prady-os-iso
          path: iso-build/prady-os.iso
          retention-days: 7
