# Build PradyOS ISO - Force New Run with Mirror Fixes
name: Build PradyOS ISO
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_kernel:
        description: 'Skip custom kernel build (faster)'
        required: false
        default: 'true'

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('config/package-lists/**') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Cache pip packages  
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('config/hooks/**') }}

      - name: Install live-build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            live-build debootstrap squashfs-tools isolinux \
            syslinux syslinux-efi grub-efi-amd64-bin grub-pc-bin \
            mtools xorriso git curl python3-pip nodejs npm \
            debian-archive-keyring
            
      - name: Fix Debian Keyring
        run: |
          sudo mkdir -p /usr/share/keyrings
          curl -fsSL https://ftp-master.debian.org/keys/release-12.asc | sudo gpg --dearmor > deb12.gpg
          curl -fsSL https://ftp-master.debian.org/keys/archive-key-12.asc | sudo gpg --dearmor > deb12-archive.gpg
          cat deb12.gpg deb12-archive.gpg | sudo tee /usr/share/keyrings/debian-archive-keyring.gpg > /dev/null

      - name: Configure and Build ISO (this takes ~60-90 mins)
        run: |
          cd installer/live-build-config
          chmod +x auto/config
          
          # Force clean state
          sudo lb clean --all
          
          # Explicit configuration to override any stale config files
          sudo lb config \
            --mode debian \
            --distribution bookworm \
            --architecture amd64 \
            --binary-images iso-hybrid \
            --debian-installer live \
            --archive-areas "main contrib non-free non-free-firmware" \
            --apt-options "--yes --allow-downgrades" \
            --bootstrap-options "--keyring=/usr/share/keyrings/debian-archive-keyring.gpg" \
            --mirror-bootstrap "http://deb.debian.org/debian/" \
            --mirror-chroot "http://deb.debian.org/debian/" \
            --mirror-binary "http://deb.debian.org/debian/"

          # Build with pipefail to catch errors
          set -o pipefail
          sudo lb build 2>&1 | tee /tmp/lb-build.log
        timeout-minutes: 100
        
      - name: Find and rename ISO
        run: |
          ISO=$(find installer/live-build-config -name "*.hybrid.iso" | head -1)
          if [ -z "$ISO" ]; then
            echo "ERROR: ISO not found. Build log:"
            tail -100 /tmp/lb-build.log
            exit 1
          fi
          cp "$ISO" prady-os-1.0-amd64.iso
          echo "ISO_PATH=prady-os-1.0-amd64.iso" >> $GITHUB_ENV
          
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: prady-os-1.0-iso
          path: prady-os-1.0-amd64.iso
          retention-days: 14
          
      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/lb-build.log
          retention-days: 3
