name: Build PradyOS ISO

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Install live-build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap curl gpg grub-pc-bin grub-efi-amd64-bin xorriso syslinux-utils

      - name: Fix Debian Keyring
        run: |
          sudo mkdir -p /usr/share/keyrings
          curl -fsSL https://ftp-master.debian.org/keys/release-12.asc | sudo gpg --dearmor > deb12.gpg
          curl -fsSL https://ftp-master.debian.org/keys/archive-key-12.asc | sudo gpg --dearmor > deb12-archive.gpg
          cat deb12.gpg deb12-archive.gpg | sudo tee /usr/share/keyrings/debian-archive-keyring.gpg > /dev/null
          mkdir -p installer/live-build-config/config/bootstrap_keyrings
          cp /usr/share/keyrings/debian-archive-keyring.gpg installer/live-build-config/config/bootstrap_keyrings/

      - name: Patch host ISO tools via dpkg-divert
        run: |
          # dpkg-divert makes apt install genisoimage to .distrib instead of the real path.
          # Our wrapper at the real path always injects -allow-limited-size.
          sudo dpkg-divert --local --rename --add /usr/bin/genisoimage
          sudo dpkg-divert --local --rename --add /usr/bin/mkisofs

          # Write wrappers using printf (avoids heredoc YAML parsing issues)
          printf '%s\n' '#!/bin/sh' \
            'for bin in /usr/bin/genisoimage.distrib /usr/bin/genisoimage.real; do' \
            '  [ -x "$bin" ] && exec "$bin" -allow-limited-size "$@"' \
            'done' \
            'echo "genisoimage wrapper: no real binary found" >&2; exit 1' \
            | sudo tee /usr/bin/genisoimage > /dev/null

          printf '%s\n' '#!/bin/sh' \
            'for bin in /usr/bin/mkisofs.distrib /usr/bin/mkisofs.real; do' \
            '  [ -x "$bin" ] && exec "$bin" -allow-limited-size "$@"' \
            'done' \
            'echo "mkisofs wrapper: no real binary found" >&2; exit 1' \
            | sudo tee /usr/bin/mkisofs > /dev/null

          sudo chmod +x /usr/bin/genisoimage
          sudo chmod +x /usr/bin/mkisofs

          echo "Diversion registered:"
          sudo dpkg-divert --list /usr/bin/genisoimage
          sudo dpkg-divert --list /usr/bin/mkisofs

          echo "Wrapper contents:"
          cat /usr/bin/genisoimage
          cat /usr/bin/mkisofs

      - name: Patch live-build binary_iso script
        run: |
          # Find and patch live-build's ISO builder script(s) to add -allow-limited-size.
          echo "=== Searching for live-build binary_iso script ==="
          find /usr /lib /share -name 'binary_iso' 2>/dev/null || true
          find /usr -path '*/live/build/*' -name 'binary*' 2>/dev/null | sort || true
          echo "=== live-build package contents ==="
          dpkg -L live-build 2>/dev/null | grep -i 'binary' || true

          PATCHED=0
          while IFS= read -r f; do
            if [ -f "$f" ]; then
              echo "Patching $f"
              sudo sed -i -E \
                's/(genisoimage|mkisofs|xorrisofs)([^-])/\1 -allow-limited-size\2/g' \
                "$f"
              grep -nE 'genisoimage|mkisofs|xorrisofs|allow-limited-size' "$f" || true
              PATCHED=1
            fi
          done < <(find /usr -name 'binary_iso' 2>/dev/null)

          if [ "$PATCHED" -eq 0 ]; then
            echo "WARNING: live-build binary_iso script not found via find — skipping direct patch"
            echo "Relying on dpkg-divert wrappers for -allow-limited-size injection"
          fi

      - name: Configure and Build ISO
        run: |
          cd installer/live-build-config
          chmod +x auto/config
          sudo lb clean --all
          sudo lb config \
            --mode debian \
            --distribution bookworm \
            --architecture amd64 \
            --binary-images iso-hybrid \
            --bootloader grub \
            --debian-installer false \
            --archive-areas "main contrib non-free non-free-firmware" \
            --mirror-bootstrap "http://deb.debian.org/debian" \
            --mirror-chroot "http://deb.debian.org/debian" \
            --mirror-binary "http://deb.debian.org/debian" \
            --apt-indices false \
            --linux-packages none
          set -o pipefail
          sudo lb build 2>&1 | tee /tmp/lb-build.log
        timeout-minutes: 100

      - name: Find and rename ISO
        run: |
          ISO=$(find installer/live-build-config -name "*.hybrid.iso" | head -1)
          if [ -z "$ISO" ]; then
            echo "ERROR: ISO not found."
            exit 1
          fi
          cp "$ISO" prady-os-1.0-amd64.iso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v7
        with:
          name: prady-os-iso
          path: prady-os-1.0-amd64.iso

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-log
          path: /tmp/lb-build.log
