name: Build PradyOS ISO

on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install live-build
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap rsync xorriso grub-pc-bin grub-efi-amd64-bin isolinux syslinux-common

      - name: Stage syslinux assets
        run: |
          # The Ubuntu live-build lb_binary_syslinux script expects syslinux files at /root/isolinux/.
          # Pre-populate that directory from the installed Ubuntu packages so the build doesn't fail.
          sudo mkdir -p /root/isolinux
          # Locate a real, readable isolinux.bin (prefer package file lists; fallback to filesystem search).
          echo "Searching for isolinux.bin under /usr..."
          ISOLINUX_BIN=""
          for candidate in $(dpkg -L isolinux 2>/dev/null | grep -E '/isolinux\.bin$' || true); do
            if [ -f "$candidate" ]; then
              ISOLINUX_BIN="$candidate"
              break
            fi
          done
          if [ -z "$ISOLINUX_BIN" ]; then
            while IFS= read -r candidate; do
              if [ -f "$candidate" ]; then
                ISOLINUX_BIN="$candidate"
                break
              fi
            done < <(find /usr -type f -name "isolinux.bin" 2>/dev/null)
          fi
          echo "Found isolinux.bin at: ${ISOLINUX_BIN:-<not found>}"
          if [ -n "$ISOLINUX_BIN" ]; then
            sudo cp "$ISOLINUX_BIN" /root/isolinux/
            sudo test -f /root/isolinux/isolinux.bin
          else
            echo "ERROR: isolinux.bin not found or not readable; cannot continue"
            exit 1
          fi
          # Copy all .c32 modules (from syslinux-common → /usr/lib/syslinux/modules/bios/)
          find /usr/lib/syslinux -type f -name "*.c32" 2>/dev/null | while read -r f; do sudo cp "$f" /root/isolinux/; done
          echo "Staged files in /root/isolinux/:"
          sudo find /root/isolinux -type f -printf "%f\n"

      - name: Build ISO
        working-directory: iso-build
        run: sudo make build

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v7
        with:
          name: prady-os-iso
          path: iso-build/prady-os.iso
          retention-days: 7
