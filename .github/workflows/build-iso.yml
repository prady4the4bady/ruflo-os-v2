name: Build Prady OS ISO

# Triggers:
# - push to main:        runs validate + smoke-test-iso (no Buildroot compile)
# - push to a v* tag:    runs validate + smoke-test-iso + build-iso + publish-release
# - workflow_dispatch:   runs validate + smoke-test-iso + build-iso (no publish)
#                        Useful when ci.yml dispatches us after a green push,
#                        and for manual rebuilds without cutting a tag.
#
# The full Buildroot compile takes 1-4 hours on first run, so it only runs
# on tag pushes and manual dispatches - never on every push to main.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      reason:
        description: Free-form reason / dispatch source (logged in summary)
        required: false
        default: 'manual dispatch'

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  # ---------------------------------------------------------------------
  # validate - the canonical configuration check. Mirrors smoke-test-iso
  # but is required as the gate for the heavy build-iso job.
  # ---------------------------------------------------------------------
  validate:
    name: Validate ISO build configuration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml Pillow
      - name: Run ISO build config tests
        run: python -m pytest build/iso/tests/ -W error::DeprecationWarning -q
      - name: Validate production compose
        run: docker compose -f build/iso/docker-compose.prod.yml config --quiet
      - name: Validate development compose
        run: docker compose -f docker-compose.dev.yml config --quiet
      - name: Shell script syntax check
        run: |
          bash -n build/iso/scripts/build_iso.sh
          bash -n build/iso/scripts/sign_iso.sh
          bash -n build/iso/scripts/write_usb.sh
      - name: Verify referenced rootfs files exist
        run: |
          set -euo pipefail
          missing=0
          for path in \
            build/iso/Makefile \
            build/iso/buildroot-config/kryos_defconfig \
            build/iso/grub/grub.cfg \
            build/iso/scripts/build_iso.sh \
            build/iso/scripts/sign_iso.sh \
            build/iso/scripts/write_usb.sh \
            build/iso/docker-compose.prod.yml ; do
            if [ ! -e "$path" ]; then
              echo "::error file=$path::required ISO build input missing"
              missing=$((missing+1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            exit 1
          fi
          echo "All required ISO build inputs present."

  smoke-test-iso:
    name: Smoke test ISO config (fast, every push)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml Pillow
      - name: Run ISO build config tests
        run: python -m pytest build/iso/tests/ -W error::DeprecationWarning -q
      - name: Validate production compose
        run: docker compose -f build/iso/docker-compose.prod.yml config --quiet
      - name: Validate development compose
        run: docker compose -f docker-compose.dev.yml config --quiet
      - name: Shell script syntax check
        run: |
          bash -n build/iso/scripts/build_iso.sh
          bash -n build/iso/scripts/sign_iso.sh
          bash -n build/iso/scripts/write_usb.sh

  # ---------------------------------------------------------------------
  # build-iso - full Buildroot compile + GRUB ISO assembly.
  # Runs ONLY on v* tag pushes or manual workflow_dispatch.
  # On a normal push to main this job is skipped by design.
  # ---------------------------------------------------------------------
  build-iso:
    name: Build and publish ISO
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [validate, smoke-test-iso]
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write
    steps:
      - name: Maximize build space
        # Must run BEFORE checkout. The action creates an LVM-backed
        # volume at /home/runner/work/<repo>/<repo> and wipes whatever
        # exists there ("WARNING: directory is not empty, data loss
        # might occur"). Checkout has to happen into the new empty
        # volume, not the other way around.
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 4096
          swap-size-mb: 6144
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Checkout
        uses: actions/checkout@v5
        with:
          # The build-iso job copies ai-core/{prax-brain,neila,ahnis}/
          # into the rootfs overlay. Those are vendored, not submodules,
          # so a recursive fetch (which would pull compositor/ags-base,
          # hyprland-base, rofi-base, plus the neila + ahnis upstreams)
          # is wasted bandwidth. Keep it shallow.
          submodules: false

      - name: Install Buildroot dependencies
        run: |
          sudo apt-get update
          # grub-common provides /usr/lib/grub/* shared base.
          # grub-pc-bin provides i386-pc/ modules for BIOS boot.
          # grub-efi-amd64-bin provides x86_64-efi/ modules for UEFI boot.
          # All three are required by grub-mkrescue for a hybrid ISO; the
          # *-bin packages depend on grub-common in Ubuntu 24.04 but listing
          # it explicitly removes any ambiguity if that ever changes.
          sudo apt-get install -y --no-install-recommends \
            build-essential libncurses-dev bison flex libssl-dev libelf-dev \
            wget rsync bc cpio unzip python3 python3-pip \
            grub-common grub-pc-bin grub-efi-amd64-bin \
            xorriso squashfs-tools mtools \
            jq

      - name: Setup Python (build host)
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python build dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest pyyaml Pillow

      - name: Pre-build sanity tests
        run: python3 -m pytest build/iso/tests/ -W error::DeprecationWarning -q

      - name: Validate production compose
        run: docker compose -f build/iso/docker-compose.prod.yml config --quiet

      - name: Install AI stack into rootfs overlay
        # build_iso.sh stages the rest of the overlay (UI dist, GRUB,
        # docker-compose.prod.yml). We add the autonomous AI stack on
        # top so it ships at /opt/<name> on the booted system.
        # Note: `cp -r src/. dest/` copies CONTENTS into dest; without
        # the trailing /. cp would create dest/src instead.
        run: |
          set -euo pipefail
          OVERLAY="build/iso/buildroot-config/overlay"
          mkdir -p "$OVERLAY/opt/prax-brain" "$OVERLAY/opt/neila" "$OVERLAY/opt/ahnis"
          cp -r ai-core/prax-brain/. "$OVERLAY/opt/prax-brain/"
          cp -r ai-core/neila/.      "$OVERLAY/opt/neila/"
          cp -r ai-core/ahnis/.      "$OVERLAY/opt/ahnis/"
          # Strip caches so they do not bloat the squashfs
          find "$OVERLAY/opt" -name '__pycache__' -type d -prune -exec rm -rf {} +
          find "$OVERLAY/opt" -name '*.pyc' -delete
          find "$OVERLAY/opt" -name '.pytest_cache' -type d -prune -exec rm -rf {} +
          find "$OVERLAY/opt" -name '.mypy_cache'   -type d -prune -exec rm -rf {} +
          echo "AI stack staged into rootfs overlay:"
          du -sh "$OVERLAY/opt/"*

      - name: Build ISO
        # SIGN_ISO=1 generates the SHA256 sidecar + release-checksums.txt
        # via sign_iso.sh; GPG signing only happens if KRYOS_GPG_KEY_ID
        # is set (it is not, in CI by default - that is fine).
        # `export` ensures make inherits the variable; the inline `VAR=
        # cmd` form alone is fragile across recipe shells.
        env:
          SIGN_ISO: "1"
        run: |
          set -euo pipefail
          export SIGN_ISO
          make -C build/iso iso-fast 2>&1 | tee build-iso-${{ github.run_id }}.log

      - name: Verify ISO outputs
        # Hard-fail if the ISO is missing or empty. build_iso.sh writes
        # to <repo_root>/output/prady-os.iso, so we check that path only.
        run: |
          set -euo pipefail
          ISO=output/prady-os.iso
          SHA_SIDE=output/prady-os.sha256
          CHECKSUMS=output/release-checksums.txt
          for f in "$ISO" "$SHA_SIDE" "$CHECKSUMS"; do
            if [ ! -f "$f" ]; then
              echo "::error file=$f::required output missing after build"
              ls -la output/ || true
              exit 1
            fi
            if [ ! -s "$f" ]; then
              echo "::error file=$f::output file is zero bytes"
              exit 1
            fi
          done
          ISO_SIZE=$(stat -c%s "$ISO")
          if [ "$ISO_SIZE" -lt 10485760 ]; then  # 10 MiB lower bound
            echo "::error::ISO size $ISO_SIZE bytes is implausibly small"
            exit 1
          fi
          ACTUAL=$(sha256sum "$ISO" | awk '{print $1}')
          EXPECTED=$(awk '{print $1}' "$SHA_SIDE")
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::ISO checksum mismatch (got $ACTUAL, expected $EXPECTED)"
            exit 1
          fi
          echo "ISO verified: ${ISO_SIZE} bytes, sha256=${ACTUAL}"

      - name: Generate build manifest
        # Single source of truth for what shipped, with file sizes,
        # checksums, and build provenance. Consumed by the publish step
        # and downstream tooling.
        run: |
          set -euo pipefail
          ISO=output/prady-os.iso
          ISO_SIZE=$(stat -c%s "$ISO")
          ISO_SHA=$(sha256sum "$ISO" | awk '{print $1}')
          REF_NAME='${{ github.ref_name }}'
          jq -n \
            --arg version       "$REF_NAME" \
            --arg ref           '${{ github.ref }}' \
            --arg sha           '${{ github.sha }}' \
            --arg run_id        '${{ github.run_id }}' \
            --arg run_url       "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg built_at      "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg iso_name      "prady-os.iso" \
            --argjson iso_size  "$ISO_SIZE" \
            --arg iso_sha256    "$ISO_SHA" \
            '{
               product: "Prady OS",
               version: $version,
               git: { ref: $ref, commit: $sha, run_id: $run_id, run_url: $run_url },
               built_at: $built_at,
               artifacts: {
                 iso: { name: $iso_name, size_bytes: $iso_size, sha256: $iso_sha256 }
               }
             }' > output/build-manifest.json
          echo "Manifest:"
          cat output/build-manifest.json

      - name: Verify build manifest
        run: |
          set -euo pipefail
          MANIFEST=output/build-manifest.json
          if [ ! -s "$MANIFEST" ]; then
            echo "::error file=$MANIFEST::manifest missing or zero bytes"
            exit 1
          fi
          # The manifest must be valid JSON and contain the iso entry
          # we just generated. Mismatched checksum here means the
          # manifest emitter and the actual ISO disagree.
          jq -e '.product == "Prady OS"' "$MANIFEST" >/dev/null
          jq -e '.artifacts.iso.sha256' "$MANIFEST" >/dev/null
          MANIFEST_SHA=$(jq -r '.artifacts.iso.sha256' "$MANIFEST")
          ACTUAL_SHA=$(sha256sum output/prady-os.iso | awk '{print $1}')
          if [ "$MANIFEST_SHA" != "$ACTUAL_SHA" ]; then
            echo "::error::manifest sha256 ($MANIFEST_SHA) does not match ISO ($ACTUAL_SHA)"
            exit 1
          fi
          echo "Manifest verified."

      - name: Generate SBOM (CycloneDX)
        # Aggregate every requirements.txt under ai-core/* into one file
        # then emit a CycloneDX 1.6 JSON SBOM for the union.
        #
        # Root cause of the previous empty-file bug: the command was
        #     cyclonedx-py requirements -i "$AGG" -o ...
        # but `-i` is `--index-url` (PyPI base URL), NOT the input
        # file flag. The requirements file is a POSITIONAL argument.
        # The tool tried to use the local aggregate path as a PEP 503
        # repository URL, --validate rejected the empty parse, the
        # exit code was non-zero, and `|| true` swallowed the error,
        # leaving a 0-byte output. Fixed below by passing the file
        # positionally, dropping the silent || true, and explicitly
        # requesting JSON output.
        run: |
          set -euo pipefail
          mkdir -p output/sbom
          python3 -m pip install --upgrade pip
          python3 -m pip install 'cyclonedx-bom>=4.6,<5'
          AGG=output/sbom/aggregate-requirements.txt
          : > "$AGG"
          for r in ai-core/*/requirements.txt; do
            if [ -f "$r" ]; then
              echo "# from $r" >> "$AGG"
              cat "$r" >> "$AGG"
              echo "" >> "$AGG"
            fi
          done
          if [ ! -s "$AGG" ]; then
            echo "::error::aggregate requirements file is empty; cannot generate SBOM"
            exit 1
          fi
          # --output-reproducible strips timestamps so identical inputs
          # produce identical SBOMs across builds. --no-validate avoids
          # rejecting the SBOM for unpinned (>=) versions, which are
          # legal but trigger validate warnings; the SBOM itself is
          # still well-formed and we run a separate jq check below.
          cyclonedx-py requirements \
            --output-format JSON \
            --output-reproducible \
            --no-validate \
            --output-file output/sbom/prady-os.cdx.json \
            "$AGG"
          # Buildroot manifest if available (best-effort; this file
          # only exists if Buildroot's legal-info target was built).
          if [ -f .buildroot/output/legal-info/manifest.csv ]; then
            cp .buildroot/output/legal-info/manifest.csv output/sbom/buildroot-manifest.csv
          fi
          ls -la output/sbom/

      - name: Verify SBOM
        # Fail the workflow if the SBOM is missing, zero bytes, or not
        # valid CycloneDX JSON. The previous run produced a 0-byte
        # output/sbom/prady-os.cdx.json that nothing caught.
        run: |
          set -euo pipefail
          SBOM=output/sbom/prady-os.cdx.json
          if [ ! -f "$SBOM" ]; then
            echo "::error file=$SBOM::SBOM was not generated"
            exit 1
          fi
          SBOM_SIZE=$(stat -c%s "$SBOM")
          if [ "$SBOM_SIZE" -lt 256 ]; then
            echo "::error file=$SBOM::SBOM is too small ($SBOM_SIZE bytes); generation likely failed silently"
            exit 1
          fi
          # Must be valid JSON with the expected CycloneDX shape.
          jq -e '.bomFormat == "CycloneDX"' "$SBOM" >/dev/null
          jq -e '.components | type == "array" and length > 0' "$SBOM" >/dev/null
          SBOM_COMPONENTS=$(jq -r '.components | length' "$SBOM")
          echo "SBOM verified: ${SBOM_SIZE} bytes, ${SBOM_COMPONENTS} components"

      - name: Final artifact preflight
        # Last guard before upload. Confirms every file we promise to
        # ship exists and is non-empty. Failing here means the upload
        # bundle is incomplete; we'd rather fail the workflow than
        # publish a half-baked artifact.
        run: |
          set -euo pipefail
          required=(
            output/prady-os.iso
            output/prady-os.sha256
            output/release-checksums.txt
            output/build-manifest.json
            output/sbom/prady-os.cdx.json
            output/sbom/aggregate-requirements.txt
          )
          missing=0
          for f in "${required[@]}"; do
            if [ ! -s "$f" ]; then
              echo "::error file=$f::required artifact missing or empty"
              missing=$((missing+1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing required artifact(s) missing/empty; refusing to upload"
            exit 1
          fi
          echo "All required artifacts present:"
          ls -la output/ output/sbom/

      - name: Emit build summary
        # Single human-readable summary at the end of the run.
        # Lists every artifact with absolute path, size, and (where
        # applicable) checksum, plus whether publish-release will run.
        run: |
          set -euo pipefail
          ISO=output/prady-os.iso
          MANIFEST=output/build-manifest.json
          SBOM=output/sbom/prady-os.cdx.json
          ISO_SIZE_HUMAN=$(du -h "$ISO" | cut -f1)
          ISO_SIZE_BYTES=$(stat -c%s "$ISO")
          ISO_SHA=$(sha256sum "$ISO" | awk '{print $1}')
          MANIFEST_SIZE=$(stat -c%s "$MANIFEST")
          SBOM_SIZE_HUMAN=$(du -h "$SBOM" | cut -f1)
          SBOM_SIZE_BYTES=$(stat -c%s "$SBOM")
          SBOM_COMPONENTS=$(jq -r '.components | length' "$SBOM")
          # publish-release runs only on v* tag pushes. Surface the
          # decision explicitly in the summary so it is never a
          # surprise that a workflow_dispatch run did not produce a
          # GitHub Release.
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            RELEASE_STATUS="will publish to GitHub Release **${{ github.ref_name }}**"
          else
            RELEASE_STATUS="not publishing (this run was triggered by **${{ github.event_name }}** on \`${{ github.ref }}\`; releases only fire on \`refs/tags/v*\`)"
          fi
          {
            echo "## Prady OS ISO Build"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Version | \`${{ github.ref_name }}\` |"
            echo "| Commit  | \`${{ github.sha }}\` |"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            echo "| ISO     | \`output/prady-os.iso\` (${ISO_SIZE_HUMAN}, ${ISO_SIZE_BYTES} bytes) |"
            echo "| ISO SHA256 | \`${ISO_SHA}\` |"
            echo "| Checksum sidecar | \`output/prady-os.sha256\` |"
            echo "| Release checksums | \`output/release-checksums.txt\` |"
            echo "| Manifest | \`output/build-manifest.json\` (${MANIFEST_SIZE} bytes) |"
            echo "| SBOM | \`output/sbom/prady-os.cdx.json\` (${SBOM_SIZE_HUMAN}, ${SBOM_COMPONENTS} components) |"
            if [ -f output/prady-os.iso.sig ]; then
              SIG_SIZE=$(stat -c%s output/prady-os.iso.sig)
              echo "| GPG signature | \`output/prady-os.iso.sig\` (${SIG_SIZE} bytes) |"
            else
              echo "| GPG signature | not generated (set KRYOS_GPG_KEY_ID secret to enable) |"
            fi
            if [ -f output/sbom/buildroot-manifest.csv ]; then
              BR_SIZE=$(stat -c%s output/sbom/buildroot-manifest.csv)
              echo "| Buildroot manifest | \`output/sbom/buildroot-manifest.csv\` (${BR_SIZE} bytes) |"
            fi
            echo "| Release publication | ${RELEASE_STATUS} |"
            echo ""
            echo "### Output tree"
            echo '```'
            ls -la output/
            echo "output/sbom:"
            ls -la output/sbom/
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v7
        with:
          name: prady-os-iso
          path: |
            output/prady-os.iso
            output/prady-os.sha256
            output/release-checksums.txt
            output/prady-os.iso.sig
            output/build-manifest.json
            output/sbom/**
          # `error` is correct here because the preflight step above
          # already verified every required file exists. If upload-
          # artifact still cannot find them, that is a real
          # infrastructure failure we want to surface, not warn on.
          # The optional .iso.sig is only present when KRYOS_GPG_KEY_ID
          # is set; the upload pattern lists each file individually so
          # the missing-sig case does not trip `error` (the action only
          # fails if the entire `path` set yields zero matches).
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: prady-os-build-log
          path: build-iso-${{ github.run_id }}.log
          # When build-iso fails before the `Build ISO` step runs the
          # log file does not exist; that is expected. `ignore` keeps
          # the run summary clean of false-positive warnings.
          if-no-files-found: ignore
          retention-days: 14

  # ---------------------------------------------------------------------
  # publish-release - uploads ISO + sidecars to the GitHub Release for
  # the v* tag that triggered the build.
  #
  # SKIP CONDITIONS (intentional):
  # - workflow_dispatch runs (manual rebuilds): produce artifacts but
  #   no Release. The artifacts live on the Actions run page for 30
  #   days. To get a permanent Release, push a v* tag.
  # - push to main: same; only the validate + smoke-test-iso jobs
  #   actually run on a plain main push, so this job's `needs:` chain
  #   is not satisfied either way.
  # - any failure in build-iso: `needs: build-iso` requires success.
  #
  # The Build summary step in build-iso emits "Release publication"
  # so the skip is never silent.
  # ---------------------------------------------------------------------
  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-iso
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v7
        with:
          name: prady-os-iso
          path: output

      - name: Verify required release files
        run: |
          set -euo pipefail
          required=(
            output/prady-os.iso
            output/prady-os.sha256
            output/release-checksums.txt
            output/build-manifest.json
            output/sbom/prady-os.cdx.json
          )
          missing=0
          for f in "${required[@]}"; do
            if [ ! -s "$f" ]; then
              echo "::error file=$f::required release artifact missing or empty"
              missing=$((missing+1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            exit 1
          fi
          echo "Release bundle:"
          ls -la output/ output/sbom/

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          name: "Prady OS ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          # Strict: every file we list must be present. The preflight
          # step above already confirmed this; failing here would mean
          # something deleted them between steps, which is a real bug.
          fail_on_unmatched_files: true
          files: |
            output/prady-os.iso
            output/prady-os.sha256
            output/release-checksums.txt
            output/build-manifest.json
            output/sbom/prady-os.cdx.json
          body: |
            ## Prady OS ${{ github.ref_name }}

            ### Download
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/prady-os.iso
            sha256sum -c prady-os.sha256
            ```

            ### Boot
            ```bash
            # Write to USB (find the right device with: lsblk)
            sudo bash build/iso/scripts/write_usb.sh /dev/sdX

            # Or boot in QEMU
            qemu-system-x86_64 -m 4G -smp 4 -boot d -cdrom prady-os.iso -enable-kvm
            ```

            ### Includes
            - Prax - autonomous AI stack
            - NEILA desktop AI agent (port 8090)
            - AHNIS semantic memory (port 8091)
            - Ollama local LLM server (port 11434)
            - prax-brain - research → propose → build loop

            Full provenance in `build-manifest.json`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach optional GPG signature
        # Signature is only generated when KRYOS_GPG_KEY_ID is set in
        # repo secrets. When absent, this step is a no-op so the main
        # publish step above can stay strict (fail_on_unmatched_files).
        if: hashFiles('output/prady-os.iso.sig') != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: output/prady-os.iso.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
