name: Build PradyOS ISO

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Install live-build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap curl gpg grub-pc-bin grub-efi-amd64-bin xorriso syslinux-utils

      - name: Fix Debian Keyring
        run: |
          sudo mkdir -p /usr/share/keyrings
          curl -fsSL https://ftp-master.debian.org/keys/release-12.asc | sudo gpg --dearmor > deb12.gpg
          curl -fsSL https://ftp-master.debian.org/keys/archive-key-12.asc | sudo gpg --dearmor > deb12-archive.gpg
          cat deb12.gpg deb12-archive.gpg | sudo tee /usr/share/keyrings/debian-archive-keyring.gpg > /dev/null
          mkdir -p installer/live-build-config/config/bootstrap_keyrings
          cp /usr/share/keyrings/debian-archive-keyring.gpg installer/live-build-config/config/bootstrap_keyrings/

      - name: Install ISO tool wrappers
        run: |
          # Place wrappers in /usr/local/bin, which appears before /usr/bin in both
          # the default PATH and sudo's secure_path (/usr/local/bin:/usr/bin:...).
          # When live-build calls genisoimage (or sudo genisoimage), our wrapper is
          # found first and always injects -allow-limited-size before forwarding.
          printf '%s\n' '#!/bin/sh' 'exec /usr/bin/genisoimage -allow-limited-size "$@"' \
            | sudo tee /usr/local/bin/genisoimage > /dev/null
          printf '%s\n' '#!/bin/sh' 'exec /usr/bin/mkisofs -allow-limited-size "$@"' \
            | sudo tee /usr/local/bin/mkisofs > /dev/null
          printf '%s\n' '#!/bin/sh' 'exec /usr/bin/xorrisofs -allow-limited-size "$@"' \
            | sudo tee /usr/local/bin/xorrisofs > /dev/null
          sudo chmod +x /usr/local/bin/genisoimage /usr/local/bin/mkisofs /usr/local/bin/xorrisofs
          echo "Wrappers installed:"
          cat /usr/local/bin/genisoimage
          cat /usr/local/bin/mkisofs

      - name: Patch live-build binary_iso script
        run: |
          # The live-build ISO builder is at a known path (lb_ prefix, confirmed by
          # dpkg -L live-build).  Patch it directly so -allow-limited-size is always
          # passed when genisoimage / mkisofs is invoked, regardless of PATH tricks.
          LB_BINARY_ISO="/usr/lib/live/build/lb_binary_iso"

          echo "=== live-build binary scripts ==="
          dpkg -L live-build 2>/dev/null | grep -E '/build/lb_' | sort || true

          if [ ! -f "$LB_BINARY_ISO" ]; then
            echo "WARNING: $LB_BINARY_ISO not found — trying find fallback"
            LB_BINARY_ISO=$(find /usr -name 'lb_binary_iso' 2>/dev/null | head -1)
          fi

          if [ -n "$LB_BINARY_ISO" ] && [ -f "$LB_BINARY_ISO" ]; then
            echo "=== Before patch (genisoimage/mkisofs lines in $LB_BINARY_ISO) ==="
            grep -n 'genisoimage\|mkisofs\|xorrisofs\|allow-limited' "$LB_BINARY_ISO" || echo "(none)"

            sudo sed -i \
              -e 's/genisoimage /genisoimage -allow-limited-size /g' \
              -e 's/mkisofs /mkisofs -allow-limited-size /g' \
              -e 's/xorrisofs /xorrisofs -allow-limited-size /g' \
              "$LB_BINARY_ISO"

            echo "=== After patch ==="
            grep -n 'genisoimage\|mkisofs\|xorrisofs\|allow-limited' "$LB_BINARY_ISO" || echo "(none)"
            echo "PATCHED: $LB_BINARY_ISO"
          else
            echo "ERROR: lb_binary_iso not found anywhere — relying solely on /usr/local/bin wrappers"
          fi

      - name: Configure and Build ISO
        run: |
          cd installer/live-build-config
          chmod +x auto/config
          sudo lb clean --all
          sudo lb config \
            --mode debian \
            --distribution bookworm \
            --architecture amd64 \
            --binary-images iso-hybrid \
            --bootloader grub \
            --debian-installer false \
            --archive-areas "main contrib non-free non-free-firmware" \
            --mirror-bootstrap "http://deb.debian.org/debian" \
            --mirror-chroot "http://deb.debian.org/debian" \
            --mirror-binary "http://deb.debian.org/debian" \
            --apt-indices false \
            --linux-packages none
          set -o pipefail
          sudo lb build 2>&1 | tee /tmp/lb-build.log
        timeout-minutes: 100

      - name: Find and rename ISO
        run: |
          ISO=$(find installer/live-build-config -name "*.hybrid.iso" | head -1)
          if [ -z "$ISO" ]; then
            echo "ERROR: ISO not found."
            exit 1
          fi
          cp "$ISO" prady-os-1.0-amd64.iso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v7
        with:
          name: prady-os-iso
          path: prady-os-1.0-amd64.iso

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-log
          path: /tmp/lb-build.log
