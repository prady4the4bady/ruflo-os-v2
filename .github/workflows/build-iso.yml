name: Build Prady OS ISO

# Two paths:
# - push to main / manual dispatch: validate config + run fast ISO test suite
#   (no Buildroot build — would take 2+ hours on every push).
# - tag push `v*`: validate, then run the full Buildroot build and publish
#   the ISO as a GitHub Release asset.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: read
env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
jobs:
  validate:
    name: Validate ISO build configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Python test dependencies
        run: python -m pip install --upgrade pip pytest pyyaml Pillow
      - name: Run ISO build config tests
        run: python -m pytest build/iso/tests/ -W error::DeprecationWarning -q
      - name: Validate production compose
        run: docker compose -f build/iso/docker-compose.prod.yml config --quiet
      - name: Validate development compose
        run: docker compose -f docker-compose.dev.yml config --quiet
      - name: Shell script syntax check
        run: |
          bash -n build/iso/scripts/build_iso.sh
          bash -n build/iso/scripts/sign_iso.sh
          bash -n build/iso/scripts/write_usb.sh

  smoke-test-iso:
    name: Smoke test ISO config (fast, every push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip pytest pyyaml Pillow
      - run: python -m pytest build/iso/tests/ -W error::DeprecationWarning -q
      - run: docker compose -f build/iso/docker-compose.prod.yml config --quiet
      - run: docker compose -f docker-compose.dev.yml config --quiet
      - run: |
          bash -n build/iso/scripts/build_iso.sh
          bash -n build/iso/scripts/sign_iso.sh
          bash -n build/iso/scripts/write_usb.sh

  build-iso:
    name: Build and publish ISO
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Maximize build space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 4096
          swap-size-mb: 6144
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Install Buildroot dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses-dev bison flex libssl-dev libelf-dev \
            wget rsync bc cpio unzip python3 python3-pip \
            grub-pc-bin grub-efi-amd64-bin xorriso squashfs-tools mtools

      - name: Install Python build dependencies
        run: python3 -m pip install --upgrade pip pytest pyyaml Pillow

      - name: Pre-build sanity tests
        run: python3 -m pytest build/iso/tests/ -W error::DeprecationWarning -q

      - name: Validate production compose
        run: docker compose -f build/iso/docker-compose.prod.yml config --quiet

      - name: Install prax-brain into rootfs overlay
        run: |
          mkdir -p build/iso/rootfs_overlay/opt/prax-brain
          cp -r ai-core/prax-brain/ build/iso/rootfs_overlay/opt/prax-brain/
          mkdir -p build/iso/rootfs_overlay/opt/neila
          cp -r ai-core/neila/ build/iso/rootfs_overlay/opt/neila/
          mkdir -p build/iso/rootfs_overlay/opt/ahnis
          cp -r ai-core/ahnis/ build/iso/rootfs_overlay/opt/ahnis/

      - name: Build ISO
        run: SIGN_ISO=1 make -C build/iso iso-fast

      - name: Emit SHA256 summary
        run: |
          ISO=output/prady-os.iso
          if [ ! -f "$ISO" ]; then
            echo "ERROR: ISO not found at $ISO" >&2
            ls -la output/ || true
            exit 1
          fi
          SHA256=$(sha256sum "$ISO" | awk '{print $1}')
          {
            echo "## Prady OS ISO Build"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| ISO | prady-os.iso |"
            echo "| SHA256 | \`${SHA256}\` |"
            if [ -f output/prady-os.iso.sig ]; then
              echo "| Signature | prady-os.iso.sig |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: prady-os-iso
          path: |
            output/prady-os.iso
            output/prady-os.sha256
            output/release-checksums.txt
            output/prady-os.iso.sig
          if-no-files-found: warn
          retention-days: 30

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-iso
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: prady-os-iso
          path: output
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/prady-os.iso
            output/prady-os.sha256
            output/release-checksums.txt
            output/prady-os.iso.sig
          fail_on_unmatched_files: false
          generate_release_notes: true
