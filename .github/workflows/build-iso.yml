name: Build PradyOS ISO

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Install live-build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap curl gpg grub-pc-bin grub-efi-amd64-bin xorriso syslinux-utils

      - name: Fix Debian Keyring
        run: |
          sudo mkdir -p /usr/share/keyrings
          curl -fsSL https://ftp-master.debian.org/keys/release-12.asc | sudo gpg --dearmor > deb12.gpg
          curl -fsSL https://ftp-master.debian.org/keys/archive-key-12.asc | sudo gpg --dearmor > deb12-archive.gpg
          cat deb12.gpg deb12-archive.gpg | sudo tee /usr/share/keyrings/debian-archive-keyring.gpg > /dev/null
          mkdir -p installer/live-build-config/config/bootstrap_keyrings
          cp /usr/share/keyrings/debian-archive-keyring.gpg installer/live-build-config/config/bootstrap_keyrings/

      - name: Patch live-build binary_iso script for large squashfs
        run: |
          # On Ubuntu 24.04, /usr/bin/genisoimage is xorriso in genisoimage emulation mode.
          # xorriso does NOT accept -allow-limited-size (a genisoimage-only flag).
          # xorriso handles files >4GiB natively via ISO 9660 level 3 (-iso-level 3).
          # Patch lb_binary_iso to add -iso-level 3 to the genisoimage invocation line.
          LB_BINARY_ISO="/usr/lib/live/build/lb_binary_iso"

          if [ ! -f "$LB_BINARY_ISO" ]; then
            LB_BINARY_ISO=$(find /usr -name 'lb_binary_iso' 2>/dev/null | head -1)
          fi

          echo "Using: $LB_BINARY_ISO"
          echo "=== ISO invocation line before patch ==="
          grep -n 'genisoimage\b.*\${GENISOIMAGE_OPTIONS' "$LB_BINARY_ISO" || echo "(not found)"

          # Patch: insert -iso-level 3 right after the genisoimage command on the invocation line
          sudo sed -i \
            's|^genisoimage \${GENISOIMAGE_OPTIONS}|genisoimage -iso-level 3 ${GENISOIMAGE_OPTIONS}|' \
            "$LB_BINARY_ISO"

          echo "=== ISO invocation line after patch ==="
          grep -n 'genisoimage\b.*\${GENISOIMAGE_OPTIONS' "$LB_BINARY_ISO" || echo "(not found)"
          echo "=== Also check what genisoimage actually is ==="
          file /usr/bin/genisoimage || true
          ls -la /usr/bin/genisoimage || true

      - name: Configure and Build ISO
        run: |
          cd installer/live-build-config
          chmod +x auto/config
          sudo lb clean --all
          sudo lb config \
            --mode debian \
            --distribution bookworm \
            --architecture amd64 \
            --binary-images iso-hybrid \
            --bootloader grub \
            --debian-installer false \
            --archive-areas "main contrib non-free non-free-firmware" \
            --mirror-bootstrap "http://deb.debian.org/debian" \
            --mirror-chroot "http://deb.debian.org/debian" \
            --mirror-binary "http://deb.debian.org/debian" \
            --apt-indices false \
            --linux-packages none
          set -o pipefail
          sudo lb build 2>&1 | tee /tmp/lb-build.log
        timeout-minutes: 100

      - name: Find and rename ISO
        run: |
          ISO=$(find installer/live-build-config -name "*.hybrid.iso" | head -1)
          if [ -z "$ISO" ]; then
            echo "ERROR: ISO not found."
            exit 1
          fi
          cp "$ISO" prady-os-1.0-amd64.iso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v7
        with:
          name: prady-os-iso
          path: prady-os-1.0-amd64.iso

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-log
          path: /tmp/lb-build.log
