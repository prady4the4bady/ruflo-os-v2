# Routing Policy Configuration
# mode: local-first | local-only | cloud-only
mode: local-first

# How long (seconds) to wait for Ollama before declaring it unavailable
local_timeout_seconds: 10

providers:
  ollama:
    base_url: "http://localhost:11434"
    timeout_seconds: 10

  openai:
    base_url: "https://api.openai.com/v1"
    env_key: OPENAI_API_KEY
    timeout_seconds: 60

  anthropic:
    base_url: "https://api.anthropic.com/v1"
    env_key: ANTHROPIC_API_KEY
    timeout_seconds: 60

  nim:
    base_url: "https://api.nvcf.nvidia.com/v1"
    env_key: NVIDIA_NIM_API_KEY
    timeout_seconds: 60

  gemini:
    base_url: "https://generativelanguage.googleapis.com/v1beta"
    env_key: GEMINI_API_KEY
    timeout_seconds: 60

  vllm:
    base_url: "http://localhost:8000"
    env_key: VLLM_API_KEY
    timeout_seconds: 120

# Order to try cloud providers when falling back from local
fallback_order:
  - openai
  - anthropic
  - nim
  - gemini
