# GRUB Configuration — Prady OS
# Phase 33: Production ISO Build
#
# Boot menu: Prady OS (default), Recovery, OOBE, Memtest
# Theme: macOS-inspired dark space (#0a0e1a)

set default=0
set timeout=5
set timeout_style=menu

#
# Load graphical terminal and theme
#
insmod all_video
insmod gfxterm
insmod png
insmod gfxmenu
insmod serial

if loadfont unicode; then
    set gfxmode=auto
terminal_output serial gfxterm
fi

# Serial console for headless debugging
serial --unit=0 --speed=115200 --word=8 --parity=no --stop=1
terminal_input console serial
terminal_output gfxterm

if [ -f /boot/grub/theme/theme.txt ]; then
    set theme=/boot/grub/theme/theme.txt
    export theme
fi

if background_image /boot/grub/theme/background.png; then
    set color_normal=white/black
    set color_highlight=white/blue
else
    set menu_color_normal=white/black
    set menu_color_highlight=white/blue
fi

#
# Menu entries
#

# Search for the kernel on any available device (disk, CD, USB)
search --set=root --file /boot/vmlinuz

menuentry "Prady OS" --class kryos --class gnu-linux --class os {
    linux  /boot/vmlinuz quiet splash loglevel=3 console=tty1 console=ttyS0,115200n8 kryos.mode=desktop
    initrd /boot/initrd.img
}

menuentry "Prady OS — Recovery Mode" --class recovery --class gnu-linux {
    linux  /boot/vmlinuz single recovery nomodeset loglevel=5 console=tty1 console=ttyS0,115200n8
    initrd /boot/initrd.img
}

menuentry "Prady OS — First Boot Wizard" --class kryos {
    linux  /boot/vmlinuz quiet splash loglevel=3 console=tty1 console=ttyS0,115200n8 kryos.oobe=1
    initrd /boot/initrd.img
}

menuentry "Prady OS — Text Console Only" --class terminal --class gnu-linux {
    linux  /boot/vmlinuz text loglevel=4 console=tty1 console=ttyS0,115200n8 kryos.mode=console
    initrd /boot/initrd.img
}

if [ -f /boot/memtest86+.bin ]; then
    menuentry "Memory Test (Memtest86+)" --class memtest {
        linux16 /boot/memtest86+.bin
    }
fi

menuentry "System Information (GRUB shell)" --class info {
    set pager=1
    lspci
}

menuentry "Boot from first hard disk" --class hdd {
    exit
}
