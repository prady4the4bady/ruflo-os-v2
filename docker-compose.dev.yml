# Prady OS — Development Compose
# Phase 33 complete: Production ISO build pipeline added
# For production: use build/iso/docker-compose.prod.yml
# 38-Phase plan: 33/38 complete after this phase

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kryos_models
      POSTGRES_USER: kryos
      POSTGRES_PASSWORD: kryos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  model-gateway:
    build:
      context: ./ai-core/model-gateway
    environment:
      MG_LISTEN_HOST: 0.0.0.0
      MG_PORT: "8000"
      MG_REGISTRY_PATH: /app/config/model-registry.yaml
      MG_POLICY_PATH: /app/config/routing-policy.yaml
      VYREX_ENABLED: "${VYREX_ENABLED:-false}"
      VYREX_ENDPOINT: "${VYREX_ENDPOINT:-http://vyrex:8000}"
      MODEL_STORAGE_DIR: "${MODEL_STORAGE_DIR:-/opt/kryos/models}"
      HUGGINGFACE_TOKEN: "${HUGGINGFACE_TOKEN:-}"
    ports:
      - "11430:8000"
    volumes:
      - ./ai-core/model-gateway/config:/app/config:ro
      - ./models:/opt/kryos/models
    restart: unless-stopped

  vyrex:
    image: nvidia/cuda:12.4.1-runtime-ubuntu22.04
    profiles: ["gpu"]
    command: ["bash", "-lc", "python3 -m http.server 8000"]
    ports:
      - "11433:8000"
    volumes:
      - ./models:/opt/kryos/models
    restart: unless-stopped

  playwright-runner:
    build:
      context: ./automation/playwright-runner
    environment:
      PORT: "3000"
      HEADLESS: "true"
    restart: unless-stopped

  workflow-engine:
    build:
      context: ./orchestration/workflow-engine
    depends_on:
      - redis
      - model-gateway
      - playwright-runner
    environment:
      REDIS_URL: redis://redis:6379
      MODEL_GATEWAY_URL: http://model-gateway:8000
      PLAYWRIGHT_RUNNER_URL: http://playwright-runner:3000
      GATEWAY_MODEL: llama3.2:3b
      ACTIVITY_LOG_DIR: /app/logs
      HOME: /workspace-home
    ports:
      - "11431:8000"
    volumes:
      - ./orchestration/workflow-engine/logs:/app/logs
      - ${HOME:-/tmp}/Desktop:/workspace-home/Desktop
    restart: unless-stopped

  model-manager:
    build:
      context: ./platform/model-manager
    command: ["uvicorn", "prady_models.platform_api:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - postgres
    environment:
      MODEL_REGISTRY_PATH: /workspace/ai-core/model-gateway/config/model-registry.yaml
      ROUTING_POLICY_PATH: /workspace/ai-core/model-gateway/config/routing-policy.yaml
      STAGING_ROOT: /workspace/.cache/model-manager/staging
      BACKUP_ROOT: /workspace/.cache/model-manager/backups
      AUDIT_LOG_PATH: /workspace/.cache/model-manager/audit/audit.log
      MODEL_STORAGE_DIR: /workspace/models
      MODEL_GATEWAY_URL: http://model-gateway:8000
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://kryos:kryos@postgres:5432/kryos_models}
      QUANTIZATION_FORMAT: ${QUANTIZATION_FORMAT:-Q4_K_M}
    ports:
      - "8002:8000"
    volumes:
      - ./:/workspace
    restart: unless-stopped

  kryos-swarm:
    build:
      context: ./orchestration/kryos-swarm
    depends_on:
      - model-gateway
      - workflow-engine
    environment:
      SWARM_MODEL: "${SWARM_MODEL:-lumyn-agent}"
      WORKFLOW_ENGINE_URL: http://workflow-engine:8000
      MODEL_GATEWAY_URL: http://model-gateway:8000
      CHROMADB_PATH: /opt/kryos/chromadb
      MAX_SWARM_AGENTS: "${MAX_SWARM_AGENTS:-10}"
      KRYOS_LOG_LEVEL: "${KRYOS_LOG_LEVEL:-INFO}"
    ports:
      - "8004:8000"
    volumes:
      - chromadb_data:/opt/kryos/chromadb
    restart: unless-stopped

  desktop-shell:
    build:
      context: ./ui/desktop-shell
    depends_on:
      - kryos-swarm
      - model-gateway
      - workflow-engine
      - model-manager
    ports:
      - "3000:3000"
    restart: unless-stopped

  bot-bridge:
    build:
      context: ./platform/bot-bridge
    depends_on:
      - kryos-swarm
      - model-manager
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN:-}"
      KRYOS_SWARM_URL: http://kryos-swarm:8000
      MODEL_MANAGER_URL: http://model-manager:8000
    ports:
      - "8090:8090"
    restart: unless-stopped

  vision-agent:
    build:
      context: ./platform/vision-agent
    depends_on:
      - model-gateway
    environment:
      MODEL_GATEWAY_URL: http://model-gateway:8000
    ports:
      - "8091:8091"
    restart: unless-stopped

  input-controller:
    build:
      context: ./platform/input-controller
    depends_on:
      - kryos-swarm
    environment:
      KRYOS_SWARM_URL: http://kryos-swarm:8000
    ports:
      - "8092:8092"
    restart: unless-stopped

  process-manager:
    build:
      context: ./platform/process-manager
    ports:
      - "8093:8093"
    restart: unless-stopped

  memory-store:
    build:
      context: ./platform/memory-store
    ports:
      - "8094:8094"
    volumes:
      - memory_store_data:/app/data
    restart: unless-stopped

  watchdog:
    build:
      context: ./platform
      dockerfile: watchdog/Dockerfile
    ports:
      - "8115:8115"
    environment:
      DATA_DIR: /data
      NOTIFICATION_BUS_URL: http://notification-bus:8111
      AGENT_RUNTIME_URL: http://agent-runtime:8100
      AUDIT_LOG_URL: http://audit-log:8112
      MODEL_HUB_URL: http://model-hub:8113
      PERSONA_SERVICE_URL: http://persona-service:8114
      SCHEDULER_SERVICE_URL: http://task-scheduler:8110
      MEMORY_SERVICE_URL: http://memory-service:8108
      HARDWARE_INTEL_URL: http://hardware-intel:8019
      SECURITY_POLICY_URL: http://security-policy:8117
      OTA_SERVICE_URL: http://ota-service:8012
      AUTH_SERVICE_URL: http://auth-service:8013
    volumes:
      - watchdog-data:/data
    depends_on:
      - notification-bus
      - audit-log
    restart: unless-stopped

  package-manager:
    build:
      context: ./platform
      dockerfile: package-manager/Dockerfile
    ports:
      - "8116:8116"
    environment:
      DATA_DIR: /data
      CATALOG_DIR: /catalog
      NOTIFICATION_BUS_URL: http://notification-bus:8111
      SECURITY_POLICY_URL: http://security-policy:8117
      AUTH_SERVICE_URL: http://auth-service:8013
    volumes:
      - package-data:/data
      - ./platform/package-manager/catalog:/catalog:ro
    depends_on:
      - notification-bus
    restart: unless-stopped

  security-policy:
    build:
      context: ./platform/security-policy
    ports:
      - "8117:8117"
    environment:
      DATA_DIR: /data
    volumes:
      - security-data:/data
    restart: unless-stopped
  ebpf-hardening:
    build:
      context: ./platform/ebpf-hardening
    ports:
      - "8118:8118"
    privileged: true
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
      - SYS_PTRACE
      - SYS_RESOURCE
    environment:
      DATA_DIR: /data
      AUDIT_LOG_URL: http://audit-log:8112
    volumes:
      - /sys/kernel/btf/vmlinux:/sys/kernel/btf/vmlinux:ro
      - /sys/fs/bpf:/sys/fs/bpf
      - ebpf-hardening-data:/data
    depends_on:
      - audit-log
      - watchdog
    restart: unless-stopped

  ota-service:
    build:
      context: ./platform/ota-service
    ports:
      - "8012:8012"
    volumes:
      - ota_data:/data/ota
      - /tmp/grubenv:/tmp/grubenv
    environment:
      MANIFEST_URL: http://localhost:8012/static/manifest.json
      SLOT_DB_PATH: /data/ota/slot_state.db
      STAGING_DIR: /data/ota/staging
      AUDIT_LOG_URL: http://audit-log:8006
      WATCHDOG_URL: http://watchdog:8004
      EBPF_HARDENING_URL: http://ebpf-hardening:8118
    depends_on:
      - audit-log
      - watchdog
    restart: unless-stopped

  auth-service:
    build:
      context: ./platform/auth-service
    ports:
      - "8013:8013"
    volumes:
      - /run/secrets:/run/secrets
      - auth-db:/data
    cap_add:
      - DAC_READ_SEARCH
    environment:
      AUTH_DB_PATH: /data/auth.db
      JWT_PRIVATE_KEY_PATH: /run/secrets/kryos-jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /run/secrets/kryos-jwt-public.pem
    depends_on:
      - audit-log
      - security-policy
    restart: unless-stopped

  voice-service:
    build:
      context: ./platform
      dockerfile: voice-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8014:8012"
    environment:
      PORT: 8012
      VYREX_URL: http://vyrex-proxy:8105
      PRAX_AGENT_URL: http://agent-runtime:8100
      VOICE_TASK_LOOP_ENABLED: "true"
      SECURITY_POLICY_URL: http://security-policy:8117
      AUDIT_LOG_URL: http://audit-log:8112
      AUTH_SERVICE_URL: http://auth-service:8013
      WAKE_WORD: hey_kryos
      WAKE_WORD_THRESHOLD: 0.5
      DEFAULT_STT_MODEL: base
      DEFAULT_TTS_VOICE: en_US-lessac-medium
      MODELS_DIR: /root/.kryos/models
    volumes:
      - kryos-models:/root/.kryos/models
    depends_on:
      - audit-log
      - vyrex-proxy
      - security-policy
  bios-ai:
    build:
      context: ./platform/bios-ai
    ports:
      - "8017:8017"
    environment:
      DATA_DIR: /var/kryos/bios-ai
      AUDIT_LOG_URL: http://audit-log:8112
      NOTIFICATION_BUS_URL: http://notification-bus:8111
    volumes:
      - bios-ai-data:/var/kryos/bios-ai
    depends_on:
      - audit-log
      - notification-bus
    restart: unless-stopped

  self-learning:
    build:
      context: ./platform/self-learning
    ports:
      - "8018:8018"
    environment:
      DATA_DIR: /data
      VYREX_URL: http://vyrex-proxy:8105
      AUDIT_LOG_URL: http://audit-log:8112
    volumes:
      - self-learning-data:/data
    depends_on:
      - vyrex-proxy
      - audit-log
    restart: unless-stopped

  hardware-intel:
    build:
      context: ./platform/hardware-intel
      dockerfile: Dockerfile
    container_name: kryos-hardware-intel
    restart: unless-stopped
    ports:
      - "8019:8019"
    environment:
      PORT: "8019"
      AUDIT_LOG_URL: http://audit-log:8006
      NOTIFICATION_BUS_URL: http://notification-bus:8007
      SENSOR_POLL_INTERVAL: "30"
      ANOMALY_THRESHOLD: "0.3"
      ALERT_COOLDOWN_MINUTES: "5"
    volumes:
      - hardware-intel-data:/data/hardware_intel
    depends_on:
      - audit-log
      - notification-bus

  sdk-registry:
    build:
      context: ./platform/sdk-registry
      dockerfile: Dockerfile
    container_name: kryos-sdk-registry
    restart: unless-stopped
    ports:
      - "8020:8020"
    environment:
      PORT: "8020"
      AUDIT_LOG_URL: http://audit-log:8006
      NOTIFICATION_BUS_URL: http://notification-bus:8007
      SECURITY_POLICY_URL: http://security-policy:8117
      VYREX_URL: http://vyrex-proxy:8000
      SELF_LEARNING_URL: http://self-learning:8018
      WORKSPACE_BASE: /home/user/kryos-apps
      SDK_NET: kryos-sdk-net
    volumes:
      - sdk-registry-data:/data/sdk_registry
      - sdk-apps-workspace:/home/user/kryos-apps
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - audit-log
      - notification-bus
      - security-policy
      - vyrex-proxy

  loop-runner:
    build:
      context: ./platform/loop-runner
    depends_on:
      - redis
      - kryos-swarm
      - memory-store
    environment:
      REDIS_URL: redis://redis:6379
      SWARM_URL: http://kryos-swarm:8000
      MEMORY_STORE_URL: http://memory-store:8094
      MODEL_GATEWAY_URL: http://model-gateway:8000
    ports:
      - "8011:8011"
    restart: unless-stopped

  oobe-service:
    build:
      context: ./platform/oobe
    environment:
      KRYOS_CONFIG_DIR: /opt/kryos-os/config
      OOBE_DIST: /opt/kryos-os/ui/oobe-wizard/dist
    ports:
      - "8099:8099"
    volumes:
      - ./:/opt/kryos-os
    restart: unless-stopped

  system-health:
    build:
      context: ./platform/system-health
    ports:
      - "8021:8021"
    environment:
      RELEASE_NAME: Prady OS
      RELEASE_VERSION: "1.0.0"
      RELEASE_CHANNEL: dev
    restart: unless-stopped

  agent-runtime:
    build:
      context: .
      dockerfile: platform/agent-runtime/Dockerfile
    depends_on:
      - model-gateway
      - notification-bus
      - system-health
    environment:
      DATA_DIR: /data
      MODEL_HUB_URL: http://model-hub:8113
      MEMORY_SERVICE_URL: http://memory-service:8108
      PERSONA_SERVICE_URL: http://persona-service:8114
      SCHEDULER_SERVICE_URL: http://task-scheduler:8110
      NOTIFICATION_BUS_URL: http://notification-bus:8111
      AUDIT_LOG_URL: http://audit-log:8112
      WATCHDOG_URL: http://watchdog:8115
      PACKAGE_MANAGER_URL: http://package-manager:8116
      SECURITY_POLICY_URL: http://security-policy:8117
      OTA_SERVICE_URL: http://ota-service:8012
      VOICE_SERVICE_URL: http://voice-service:8012
      AUTH_SERVICE_URL: http://auth-service:8013
      SELF_LEARNING_URL: http://self-learning:8018
      HARDWARE_INTEL_URL: http://hardware-intel:8019
      SDK_REGISTRY_URL: http://sdk-registry:8020
      SYSTEM_HEALTH_URL: http://system-health:8021
      OOBE_SERVICE_URL: http://oobe-service:8099
    ports:
      - "8100:8100"
    volumes:
      - ./:/opt/kryos-os
      - agent-models-data:/root/.kryos/models
    restart: unless-stopped

  automation-service:
    build:
      context: .
      dockerfile: platform/automation/Dockerfile
    ports:
      - "8101:8101"
    volumes:
      - ./:/opt/kryos-os
    restart: unless-stopped

  vyrex-proxy:
    build:
      context: ./platform
      dockerfile: vyrex-proxy/Dockerfile
    environment:
      OLLAMA_URL: http://model-gateway:8000
      DEFAULT_MODEL: llama3
      AUTH_SERVICE_URL: http://auth-service:8013
    ports:
      - "8105:8105"
    restart: unless-stopped

  computer-use:
    build:
      context: .
      dockerfile: platform/computer-use/Dockerfile
    depends_on:
      - vyrex-proxy
      - notification-bus
    environment:
      VYREX_PROXY_URL: http://vyrex-proxy:8105
      COMPUTER_USE_MODEL: llama3
      TASK_JOURNAL_PATH: /data/task_journal.db
      MEMORY_SERVICE_URL: http://memory-service:8108
      NOTIFICATION_BUS_URL: http://notification-bus:8111
      SECURITY_POLICY_URL: http://security-policy:8117
    volumes:
      - computer-use-data:/data
    restart: unless-stopped

  memory-service:
    build:
      context: ./platform/memory-service
    ports:
      - "8108:8108"
    volumes:
      - memory-service-data:/data
    restart: unless-stopped

  task-scheduler:
    build:
      context: ./platform
      dockerfile: task-scheduler/Dockerfile
    ports:
      - "8110:8110"
    environment:
      DATA_DIR: /data
      PERSONA_SERVICE_URL: http://persona-service:8114
      MEMORY_SERVICE_URL: http://memory-service:8108
      AGENT_RUNTIME_URL: http://agent-runtime:8100
      NOTIFICATION_BUS_URL: http://notification-bus:8111
      AUTH_SERVICE_URL: http://auth-service:8013
    volumes:
      - scheduler-data:/data
    restart: unless-stopped

  notification-bus:
    build:
      context: ./platform/notification-bus
    ports:
      - "8111:8111"
    environment:
      DATA_DIR: /data
    volumes:
      - notification-data:/data
    restart: unless-stopped

  audit-log:
    build:
      context: ./platform/audit-log
    ports:
      - "8112:8112"
    environment:
      DATA_DIR: /data
      NOTIFICATION_BUS_URL: http://notification-bus:8111
      AGENT_RUNTIME_URL: http://agent-runtime:8100
    volumes:
      - audit-data:/data
    depends_on:
      - notification-bus
    restart: unless-stopped

  model-hub:
    build:
      context: ./platform
      dockerfile: model-hub/Dockerfile
    ports:
      - "8113:8113"
    environment:
      DATA_DIR: /data
      MODELS_DIR: /models
      NOTIFICATION_BUS_URL: http://notification-bus:8111
      SECURITY_POLICY_URL: http://security-policy:8117
      VYREX_URL: http://vyrex-proxy:8105
      AUTH_SERVICE_URL: http://auth-service:8013
    volumes:
      - model-hub-data:/data
      - model-hub-models:/models
    depends_on:
      - notification-bus
    restart: unless-stopped

  persona-service:
    build:
      context: ./platform
      dockerfile: persona-service/Dockerfile
    ports:
      - "8114:8114"
    environment:
      DATA_DIR: /data
      NOTIFICATION_BUS_URL: http://notification-bus:8111
      SECURITY_POLICY_URL: http://security-policy:8117
      VYREX_URL: http://vyrex-proxy:8105
      MEMORY_SERVICE_URL: http://memory-service:8108
      AUTH_SERVICE_URL: http://auth-service:8013
    volumes:
      - persona-data:/data
    depends_on:
      - notification-bus
    restart: unless-stopped

  kryos-researcher:
    build:
      context: ./platform/kryos-researcher
    ports:
      - "8120:8120"
    environment:
      DATA_DIR: /data
      NOTIFICATION_BUS_URL: http://notification-bus:8111
      MEMORY_SERVICE_URL: http://memory-service:8108
      MODEL_GATEWAY_URL: http://model-gateway:8000
      RESEARCH_ENABLED: "${RESEARCH_ENABLED:-true}"
      RESEARCH_INTERVAL_MIN: "${RESEARCH_INTERVAL_MIN:-60}"
      PROPOSAL_INTERVAL_MIN: "${PROPOSAL_INTERVAL_MIN:-240}"
      DAILY_PROPOSAL_BUDGET: "${DAILY_PROPOSAL_BUDGET:-3}"
      LUMYN_PROPOSAL_MODEL: "${LUMYN_PROPOSAL_MODEL:-llama3.2:3b}"
    volumes:
      - kryos-researcher-data:/data
    depends_on:
      - notification-bus
      - model-gateway
    restart: unless-stopped

  proposal-gate:
    build:
      context: ./platform/proposal-gate
    ports:
      - "8121:8121"
    environment:
      DATA_DIR: /data
      NOTIFICATION_BUS_URL: http://notification-bus:8111
      AGENT_RUNTIME_URL: http://agent-runtime:8100
      PROPOSAL_TTL_HOURS: "${PROPOSAL_TTL_HOURS:-168}"
    volumes:
      - proposal-gate-data:/data
    depends_on:
      - notification-bus
    restart: unless-stopped

  inventor-engine:
    build:
      context: ./platform
      dockerfile: inventor-engine/Dockerfile
    image: prady/inventor-engine:dev
    container_name: prady-inventor-engine
    restart: unless-stopped
    ports:
      - "8022:8022"
    environment:
      - PORT=8022
      - VYREX_URL=http://vyrex-proxy:8105
      - PRAX_AGENT_URL=http://agent-runtime:8100
      - AUDIT_LOG_URL=http://audit-log:8112
      - NOTIFICATION_BUS_URL=http://notification-bus:8111
      - SECURITY_POLICY_URL=http://security-policy:8117
      - SELF_LEARNING_URL=http://self-learning:8018
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - WORKSPACE_BASE=/var/prady/projects
      - SCAN_INTERVAL_HOURS=6
      - MIN_PROBLEM_SCORE=0.6
      - LOG_LEVEL=INFO
    volumes:
      - inventor-data:/data/inventor
      - prax-projects:/var/prady/projects
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - vyrex-proxy
      - audit-log
      - notification-bus
      - security-policy
      - self-learning
    healthcheck:
      test: ["CMD","python","-c","import httpx,sys; r=httpx.get('http://localhost:8022/health',timeout=5); sys.exit(0 if r.json().get('status')=='ok' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  social-publisher:
    build:
      context: ./platform/social-publisher
    image: prady/social-publisher:dev
    container_name: prady-social-publisher
    restart: unless-stopped
    ports:
      - "8023:8023"
    environment:
      - PORT=8023
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN:-}
      - TWITTER_API_KEY=${TWITTER_API_KEY:-}
      - TWITTER_API_SECRET=${TWITTER_API_SECRET:-}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID:-}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET:-}
      - PRODUCTHUNT_API_KEY=${PRODUCTHUNT_API_KEY:-}
      - INVENTOR_ENGINE_URL=http://inventor-engine:8022
      - AUDIT_LOG_URL=http://audit-log:8112
      - VYREX_URL=http://vyrex-proxy:8105
      - LOG_LEVEL=INFO
    volumes:
      - social-data:/data/social
    depends_on:
      - inventor-engine
      - audit-log
      - vyrex-proxy
    healthcheck:
      test: ["CMD","python","-c","import httpx,sys; r=httpx.get('http://localhost:8023/health',timeout=5); sys.exit(0 if r.json().get('status')=='ok' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  market-intel:
    build:
      context: ./platform/market-intel
    image: prady/market-intel:dev
    container_name: prady-market-intel
    restart: unless-stopped
    ports:
      - "8024:8024"
    environment:
      - PORT=8024
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - INVENTOR_ENGINE_URL=http://inventor-engine:8022
      - AUDIT_LOG_URL=http://audit-log:8112
      - LOG_LEVEL=INFO
    volumes:
      - market-data:/data/market
    depends_on:
      - inventor-engine
      - audit-log
    healthcheck:
      test: ["CMD","python","-c","import httpx,sys; r=httpx.get('http://localhost:8024/health',timeout=5); sys.exit(0 if r.json().get('status')=='ok' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  biz-docs:
    build:
      context: ./platform/biz-docs
    image: prady/biz-docs:dev
    container_name: prady-biz-docs
    restart: unless-stopped
    ports:
      - "8025:8025"
    environment:
      - PORT=8025
      - INVENTOR_ENGINE_URL=http://inventor-engine:8022
      - MARKET_INTEL_URL=http://market-intel:8024
      - AUDIT_LOG_URL=http://audit-log:8112
      - VYREX_URL=http://vyrex-proxy:8105
      - LOG_LEVEL=INFO
    volumes:
      - biz-docs-data:/data/biz-docs
    depends_on:
      - inventor-engine
      - market-intel
      - audit-log
      - vyrex-proxy
    healthcheck:
      test: ["CMD","python","-c","import httpx,sys; r=httpx.get('http://localhost:8025/health',timeout=5); sys.exit(0 if r.json().get('status')=='ok' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  system-organizer:
    build:
      context: ./platform/system-organizer
    image: prady/system-organizer:dev
    container_name: prady-system-organizer
    restart: unless-stopped
    ports:
      - "8026:8026"
    environment:
      - PORT=8026
      - SCAN_ROOT=/var/prady/projects
      - AUDIT_LOG_URL=http://audit-log:8112
      - NOTIFICATION_BUS_URL=http://notification-bus:8111
      - LOG_LEVEL=INFO
    volumes:
      - prax-projects:/var/prady/projects
      - organizer-data:/data/organizer
    depends_on:
      - audit-log
      - notification-bus
    healthcheck:
      test: ["CMD","python","-c","import httpx,sys; r=httpx.get('http://localhost:8026/health',timeout=5); sys.exit(0 if r.json().get('status')=='ok' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

