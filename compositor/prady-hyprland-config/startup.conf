# Start Aylur's GTK Shell (AGS) for Dock and Menu Bar
exec-once = ags -c /opt/prady/shell/app.js

# Start Vyrex daemon
exec-once = systemctl start vyrex

# Start Prax Agent
exec-once = systemctl start prax-agent

# Start ydotool daemon (required for input injection)
exec-once = ydotoold

# Set wallpaper
exec-once = swaybg -i /usr/share/backgrounds/prady/default.jpg -m fill
