animations {
    enabled = true

    # macOS-like spring animations
    bezier = macosSpring, 0.22, 1, 0.36, 1
    
    animation = windows, 1, 4, macosSpring, popin 80%
    animation = windowsOut, 1, 4, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 5, macosSpring
}
