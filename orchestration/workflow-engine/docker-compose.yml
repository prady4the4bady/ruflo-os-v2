services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  orchestration:
    build: .
    ports:
      - "11431:8000"
    environment:
      REDIS_URL: redis://redis:6379
      MODEL_GATEWAY_URL: http://host.docker.internal:11430
      PLAYWRIGHT_RUNNER_URL: http://host.docker.internal:11432
      GATEWAY_MODEL: llama3.2:3b
      ACTIVITY_LOG_DIR: /app/logs
      APPROVAL_TIMEOUT_SECONDS: "300"
    volumes:
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
